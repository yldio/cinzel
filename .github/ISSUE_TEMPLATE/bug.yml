name: "Bug report"
description: Report a bug
labels: ["bug", "triage"]
title: "[Bug]: "
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Description
      description: Please add as much details as possible regarding this bug
      placeholder: Fill with details...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/yldio/acto/CODE_OF_CONDUCT.md). 
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true