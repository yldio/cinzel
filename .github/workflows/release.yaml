name: Build Release
on:
  release:
    types:
      - published
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  cancel-in-progress: true
  group: "release-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.release.tag_name }}"
jobs:
  release-packages:
    if: "${{ github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease && !github.event.release.draft) }}"
    name: Release packages
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - id: checkout_release
        name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: "0"
          persist-credentials: "false"
      - id: mise_setup
        name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          cache: "true"
          install: "true"
      - env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          HOMEBREW_TAP_GITHUB_TOKEN: "${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}"
        id: goreleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29
        with:
          args: "${{ github.event_name == 'workflow_dispatch' && 'release --clean --snapshot --skip=publish --skip=announce --skip=validate' || 'release --clean' }}"
          distribution: goreleaser
          version: v2.14.3
      - id: release_observability
        if: "${{ always() }}"
        name: Release observability summary
        run: "set -e\n\nsummary_path=\"$GITHUB_STEP_SUMMARY\"\n\nif [ -z \"$summary_path\" ]; then\n  echo \"GITHUB_STEP_SUMMARY is not available\"\n  exit 0\nfi\n\n{\n  echo \"## Release artifact summary\"\n  echo\n  echo \"- Event: $GITHUB_EVENT_NAME\"\n  echo \"- Ref: $GITHUB_REF\"\n  echo \"- SHA: $GITHUB_SHA\"\n  echo\n  echo \"### Checksums\"\n\n  if [ -f \"dist/checksums.txt\" ]; then\n    echo\n    echo '```text'\n    cat \"dist/checksums.txt\"\n    echo '```'\n  else\n    echo\n    echo \"checksums file not found at dist/checksums.txt\"\n  fi\n\n  echo\n  echo \"### Formula output\"\n\n  formula_found=\"false\"\n  for formula in dist/*.rb; do\n    if [ -f \"$formula\" ]; then\n      formula_found=\"true\"\n      echo\n      echo \"- Generated formula: $formula\"\n    fi\n  done\n\n  if [ \"$formula_found\" = \"false\" ]; then\n    echo\n    echo \"no generated formula files found under dist/*.rb\"\n  fi\n} >> \"$summary_path\"\n"
    timeout-minutes: 20
