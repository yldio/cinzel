name: Pull Requests
on: pull_request
jobs:
  pullRequest:
    name: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@v4.1.7

    - name: Setup Go environment
      if: ${{ matrix.os }} != ubuntu-20.04
      uses: actions/setup-go@v5
      with:
        go-version: 1.22.5
    
    - name: Tests
      run: make test-ci

